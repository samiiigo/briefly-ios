<!DOCTYPE html>
<html class="dark"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Offline Mode Error State</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          fontFamily: {
            "display": ["Inter", "sans-serif"]
          },
        },
      },
    }
  </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-black font-display text-white min-h-screen flex flex-col justify-between">
<div class="relative flex flex-col flex-1 overflow-x-hidden">
<div class="flex items-center p-4 pb-4 justify-between bg-white/10 backdrop-blur-xl border-b border-white/10 sticky top-0 z-50">
<button class="flex size-12 shrink-0 items-center justify-center text-white cursor-pointer rounded-full hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-2xl">close</span>
</button>
<h2 class="text-lg font-bold leading-tight flex-1 text-center pr-12">Connection Error</h2>
</div>
<div class="flex flex-col px-4 py-8 flex-1 justify-center relative">
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[300px] h-[300px] bg-blue-500/20 rounded-full blur-[100px] pointer-events-none"></div>
<div class="flex flex-col items-center gap-8 relative z-10">
<div class="relative w-32 h-32 flex items-center justify-center rounded-[2.5rem] bg-white/5 backdrop-blur-2xl shadow-[inset_0_1px_1px_rgba(255,255,255,0.3)] border border-white/20 mb-4">
<span class="material-symbols-outlined text-6xl text-white/70">cloud_off</span>
<div class="absolute -bottom-2 -right-2 w-12 h-12 rounded-full bg-red-500/20 backdrop-blur-xl border border-red-500/50 shadow-[inset_0_1px_1px_rgba(255,255,255,0.4)] flex items-center justify-center">
<span class="material-symbols-outlined text-2xl text-red-400">warning</span>
</div>
</div>
<div class="flex flex-col items-center gap-3 px-2">
<h1 class="text-2xl font-bold leading-tight text-center text-white">Cloud Offline</h1>
<p class="text-base text-white/60 text-center max-w-[320px] leading-relaxed">
            We can't reach our cloud models right now. You can switch to On-Device mode for private, offline processing.
          </p>
</div>
<div class="w-full max-w-[320px] bg-white/5 backdrop-blur-xl rounded-2xl p-5 flex items-start gap-4 mt-2 border border-white/20 shadow-[inset_0_1px_1px_rgba(255,255,255,0.2)]">
<span class="material-symbols-outlined text-white/80 mt-0.5">lock</span>
<div>
<p class="font-semibold text-sm text-white">On-Device Processing</p>
<p class="text-xs text-white/60 mt-1 leading-relaxed">Audio never leaves your phone. Faster but slightly less accurate.</p>
</div>
</div>
</div>
</div>
<div class="flex flex-col gap-4 px-4 py-6 pb-10 bg-white/5 backdrop-blur-2xl border-t border-white/10 sticky bottom-0 z-50">
<button class="flex w-full cursor-pointer items-center justify-center rounded-xl h-14 px-4 bg-blue-500/80 backdrop-blur-md text-white border border-blue-400/50 text-base font-bold shadow-[0_0_20px_rgba(59,130,246,0.5),inset_0_1px_1px_rgba(255,255,255,0.4)] transition-all hover:bg-blue-500 hover:shadow-[0_0_25px_rgba(59,130,246,0.7),inset_0_1px_1px_rgba(255,255,255,0.5)]">
<span class="material-symbols-outlined mr-2">smartphone</span>
<span class="truncate">Switch to On-Device Mode</span>
</button>
<button class="flex w-full cursor-pointer items-center justify-center rounded-xl h-14 px-4 bg-white/5 backdrop-blur-md border border-white/20 text-white text-base font-bold shadow-[inset_0_1px_1px_rgba(255,255,255,0.2)] hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined mr-2">refresh</span>
<span class="truncate">Try Cloud Again</span>
</button>
</div>
</div>

</body></html>
