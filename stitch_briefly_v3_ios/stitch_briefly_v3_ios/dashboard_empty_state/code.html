<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Briefly - Dashboard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#136dec",
                        "background-light": "#000000",
                        "background-dark": "#000000",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings:
            'FILL' 0,
            'wght' 400,
            'GRAD' 0,
            'opsz' 24
        }
        .icon-fill {
            font-variation-settings: 'FILL' 1;
        }.glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
        .glass-button {
            background: rgba(19, 109, 236, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(19, 109, 236, 0.3);
            box-shadow: 0 0 20px rgba(19, 109, 236, 0.2);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-black text-slate-100 font-display min-h-screen flex flex-col antialiased selection:bg-primary/30">
<header class="flex items-center justify-between px-6 py-4 glass-panel border-b-0 sticky top-0 z-10">
<h1 class="text-xl font-bold tracking-tight text-white drop-shadow-md">Briefly</h1>
<button class="w-8 h-8 flex items-center justify-center rounded-full bg-white/5 border border-white/10 hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-slate-300">search</span>
</button>
</header>
<main class="flex-1 flex flex-col items-center justify-center px-6 py-12 relative overflow-hidden">
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-80 h-80 bg-primary/10 rounded-full blur-3xl -z-10"></div>
<div class="flex flex-col items-center max-w-sm w-full">
<div class="mb-12 relative flex justify-center items-center h-40 w-40" data-alt="Glassy microphone icon with concentric glass rings">
<div class="absolute inset-0 rounded-full border border-white/10 scale-125 glass-panel"></div>
<div class="absolute inset-0 rounded-full border border-white/20 scale-100 glass-panel"></div>
<div class="relative w-24 h-24 rounded-full border border-white/30 flex items-center justify-center glass-panel shadow-[0_0_30px_rgba(255,255,255,0.1)] z-10">
<span class="material-symbols-outlined text-white text-5xl font-light">mic</span>
</div>
</div>
<h2 class="text-2xl font-semibold mb-3 text-center tracking-tight text-white drop-shadow-sm">No recordings yet</h2>
<p class="text-center text-slate-400 text-sm leading-relaxed mb-10 font-medium">
                Start your first recording to see your transcripts and summaries here.
            </p>
<button class="w-full glass-button hover:bg-primary/20 hover:shadow-[0_0_25px_rgba(19,109,236,0.3)] text-blue-400 font-semibold py-4 px-6 rounded-2xl flex items-center justify-center gap-2 transition-all active:scale-[0.98] group">
<span class="material-symbols-outlined text-blue-400 text-xl group-hover:scale-110 transition-transform">fiber_manual_record</span>
                Start Recording
            </button>
</div>
</main>
<nav class="flex glass-panel border-t-0 px-2 pb-safe pt-2 relative z-20">
<a class="flex flex-1 flex-col items-center justify-center gap-1 p-2 text-white rounded-xl hover:bg-white/5 transition-colors" href="#">
<span class="material-symbols-outlined icon-fill drop-shadow-[0_0_8px_rgba(255,255,255,0.5)]">home</span>
<span class="text-[11px] font-medium text-white drop-shadow-sm">Home</span>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 p-2 text-slate-400 rounded-xl hover:bg-white/5 hover:text-white transition-colors" href="#">
<span class="material-symbols-outlined">library_books</span>
<span class="text-[11px] font-medium">Library</span>
</a>
<div class="flex flex-1 justify-center relative -top-8">
<button class="w-16 h-16 bg-red-500/90 backdrop-blur-md text-white rounded-full flex items-center justify-center shadow-[0_0_20px_rgba(239,68,68,0.5)] border border-red-400/50 hover:bg-red-500 hover:scale-105 active:scale-95 transition-all">
<span class="material-symbols-outlined text-3xl icon-fill drop-shadow-sm">mic</span>
</button>
</div>
<a class="flex flex-1 flex-col items-center justify-center gap-1 p-2 text-slate-400 rounded-xl hover:bg-white/5 hover:text-white transition-colors" href="#">
<span class="material-symbols-outlined">settings</span>
<span class="text-[11px] font-medium">Settings</span>
</a>
</nav>
<style>@supports (padding-bottom: env(safe-area-inset-bottom)) {
            .pb-safe {
                padding-bottom: max(env(safe-area-inset-bottom), 0.5rem);
            }
        }
    </style>
</body></html>
