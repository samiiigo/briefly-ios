// Top-level build file where you can add configuration options common to all sub-projects/modules.

// Point Gradle at the Android SDK: use ANDROID_HOME if local.properties is missing or invalid
def localPropertiesFile = file("local.properties")
def sdkDir = null
if (localPropertiesFile.exists()) {
  def props = new Properties()
  localPropertiesFile.withInputStream { props.load(it) }
  sdkDir = props.getProperty("sdk.dir")
}
def sdkDirValid = sdkDir != null && !sdkDir.isEmpty() && file(sdkDir).exists()
if (!sdkDirValid) {
  def envSdk = System.getenv("ANDROID_HOME") ?: System.getenv("ANDROID_SDK_ROOT")
  if (envSdk != null && !envSdk.isEmpty()) {
    def envSdkFile = file(envSdk)
    if (envSdkFile.exists()) {
      localPropertiesFile.withWriter { w ->
        w.writeLine("# Auto-generated from ANDROID_HOME - do not edit by hand if using env var")
        w.writeLine("sdk.dir=" + envSdk.replace("\\", "/"))
      }
    }
  }
}

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"
